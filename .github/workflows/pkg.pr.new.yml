name: Publish Commit
on:
  push:
    branches:
      - '**'
    tags:
      - '!**'
  pull_request:

env:
  NODE_VER: 22.18

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js ${{ env.NODE_VER }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: 'npm'

      - name: Install deps
        run: npm ci && npm run dev:prepare

      - name: Build and pack
        run: npm run prepack

      - name: Publish package preview
        run: npx pkg-pr-new publish --compact
